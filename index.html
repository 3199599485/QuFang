<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的文学作品集</title>
    <style>
        body {
            font-family: 'Serif', Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5em;
            color: #8B0000;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .work {
            margin-bottom: 30px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 20px;
        }

            .work h2 {
                color: #2F4F4F;
            }

            .work p {
                line-height: 1.6;
            }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>我的文学作品集</h1>
        <p>欢迎来到我的文学作品展示</p>
    </header>

    <div class="container">
        <div class="work">
            <h2>作品标题1</h2>
            <p>这是我第一篇文学作品的内容。您可以在这里写下您的故事、诗歌或散文。</p>
        </div>

        <div class="work">
            <h2>作品标题2</h2>
            <p>这是我第二篇文学作品的内容。继续分享您的思想和创意。</p>
        </div>

        <div class="work">
            <h2>作品标题3</h2>
            <p>这是我第三篇文学作品的内容。让您的作品在这里发光。</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 我的文学作品集 | 版权声明</p>
    </footer>

</body>
</html>
